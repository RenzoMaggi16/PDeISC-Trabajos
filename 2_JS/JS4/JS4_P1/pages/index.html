<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS4 — Fetch vs Axios</title>

  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="/public/styles/estilos.css" />
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between align-items-center">
    <span class="navbar-brand fw-semibold">
      <i class="bi bi-braces me-2"></i>JS4 — APIs
    </span>
    <button id="btn-theme" class="btn-theme-toggle" aria-label="Cambiar tema" title="Modo claro / oscuro">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </nav>

  <!-- Sección hero -->
  <section class="hero-section text-center py-5 px-3">
    <h1 class="hero-title">Consumo de API Pública</h1>
    <p class="hero-subtitle text-muted mb-3">
      Comparativa entre Fetch Nativo y Axios
    </p>
    <span class="badge endpoint-badge">
      <i class="bi bi-link-45deg me-1"></i>JSONPlaceholder · /users
    </span>
  </section>

  <!-- Sección de paneles duales -->
  <main class="container-xl pb-5">
    <div class="row g-4">

      <!-- Panel izquierdo: Fetch Nativo -->
      <div class="col-lg-6">
        <div class="panel panel-fetch h-100">
          <div class="panel-header panel-header-fetch mb-3">
            <i class="bi bi-lightning-charge-fill me-2"></i>
            <span>Fetch Nativo</span>
          </div>

          <div id="status-fetch" class="status-bar text-muted mb-3">
            En espera — presioná el botón para cargar
          </div>

          <button id="btn-fetch" class="btn btn-fetch-custom mb-4">
            <i class="bi bi-download me-2"></i>Obtener Usuarios
          </button>

          <div id="results-fetch" class="results-container"></div>
        </div>
      </div>

      <!-- Panel derecho: Axios -->
      <div class="col-lg-6">
        <div class="panel panel-axios h-100">
          <div class="panel-header panel-header-axios mb-3">
            <i class="bi bi-arrow-repeat me-2"></i>
            <span>Axios</span>
          </div>

          <div id="status-axios" class="status-bar text-muted mb-3">
            En espera — presioná el botón para cargar
          </div>

          <button id="btn-axios" class="btn btn-axios-custom mb-4">
            <i class="bi bi-download me-2"></i>Obtener Usuarios
          </button>

          <div id="results-axios" class="results-container"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Pie de página -->
  <footer class="footer-bar text-center py-3">
    <small class="text-muted">JS4_P1 · Fetch vs Axios · JSONPlaceholder</small>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmDZ4nqhVJQvMl//uGxrFJP1WBMH"
    crossorigin="anonymous"
  ></script>

  <!-- Axios vía CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Scripts de la aplicación -->
  <script src="/scripts/fetchNativo.js"></script>
  <script src="/scripts/fetchAxios.js"></script>

  <!-- Script modo claro/oscuro -->
  <script>
    (function () {
      const btn = document.getElementById('btn-theme');
      const icon = document.getElementById('theme-icon');
      const DARK = 'dark-mode';

      function applyTheme(dark) {
        document.body.classList.toggle(DARK, dark);
        icon.className = dark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
      }

      // Restaurar preferencia guardada
      const saved = localStorage.getItem('theme');
      applyTheme(saved === 'dark');

      btn.addEventListener('click', function () {
        const isDark = document.body.classList.contains(DARK);
        applyTheme(!isDark);
        localStorage.setItem('theme', !isDark ? 'dark' : 'light');
      });
    })();
  </script>

</body>
</html>
