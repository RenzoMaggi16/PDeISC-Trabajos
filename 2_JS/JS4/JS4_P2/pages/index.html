<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS4 — POST Request</title>

  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="/public/styles/estilos.css" />
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between align-items-center">
    <span class="navbar-brand fw-semibold">
      <i class="bi bi-braces me-2"></i>JS4 — APIs
    </span>
    <button id="btn-theme" class="btn-theme-toggle" aria-label="Cambiar tema" title="Modo claro / oscuro">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </nav>

  <!-- Sección hero -->
  <section class="hero-section text-center py-5 px-3">
    <h1 class="hero-title">Envío de Formulario por POST</h1>
    <p class="hero-subtitle mb-3">
      Registrá un usuario y obtené su ID de respuesta
    </p>
    <span class="badge endpoint-badge">
      <i class="bi bi-send-fill me-1"></i>JSONPlaceholder · POST /users
    </span>
  </section>

  <!-- Contenido principal: dos columnas -->
  <main class="container-xl py-5">
    <div class="row g-4 align-items-start">

      <!-- Columna izquierda: Formulario -->
      <div class="col-lg-5">
        <div class="card app-card h-100">
          <div class="card-body p-4">
            <h5 class="card-title mb-4">
              <i class="bi bi-person-plus-fill me-2 text-indigo"></i>Nuevo Usuario
            </h5>

            <!-- Campo Nombre -->
            <div class="mb-3">
              <label class="form-label fw-semibold" for="input-nombre">Nombre</label>
              <input
                type="text"
                class="form-control"
                id="input-nombre"
                placeholder="Ej: Juan Pérez"
                autocomplete="off"
              />
              <div class="campo-error" id="error-nombre"></div>
            </div>

            <!-- Campo Email -->
            <div class="mb-3">
              <label class="form-label fw-semibold" for="input-email">Email</label>
              <input
                type="text"
                class="form-control"
                id="input-email"
                placeholder="Ej: juan@example.com"
                autocomplete="off"
              />
              <div class="campo-error" id="error-email"></div>
            </div>

            <!-- Selector de método -->
            <div class="mb-4">
              <p class="fw-semibold mb-2">Método de envío:</p>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="metodo"
                    id="radio-fetch"
                    value="fetch"
                    checked
                  />
                  <label class="form-check-label" for="radio-fetch">
                    Fetch Nativo
                  </label>
                </div>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="metodo"
                    id="radio-axios"
                    value="axios"
                  />
                  <label class="form-check-label" for="radio-axios">
                    Axios
                  </label>
                </div>
              </div>
            </div>

            <!-- Botón de envío -->
            <button id="btn-submit" class="btn btn-submit w-100">
              <i class="bi bi-send me-2"></i>Enviar Registro
            </button>
          </div>
        </div>
      </div>

      <!-- Columna derecha: Panel de respuesta -->
      <div class="col-lg-7">
        <div class="card app-card h-100">
          <div class="card-body p-4">
            <h5 class="card-title mb-4">
              <i class="bi bi-server me-2 text-cyan"></i>Respuesta del Servidor
            </h5>

            <!-- Panel de respuesta con estado inicial -->
            <div id="response-panel" class="response-panel">
              <div id="response-empty" class="response-empty">
                <i class="bi bi-inbox display-4 text-muted"></i>
                <p class="mt-3 text-muted">
                  Completá el formulario y envialo<br/>para ver la respuesta aquí
                </p>
              </div>

              <div id="response-loading" class="response-loading" style="display:none">
                <div class="spinner-border text-indigo" role="status"></div>
                <p class="mt-3 text-muted">Enviando datos...</p>
              </div>

              <div id="response-content" style="display:none"></div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Pie de página -->
  <footer class="footer-bar text-center py-3">
    <small class="text-muted">JS4_P2 · POST Request · JSONPlaceholder</small>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmDZ4nqhVJQvMl//uGxrFJP1WBMH"
    crossorigin="anonymous"
  ></script>

  <!-- Axios vía CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Scripts de la aplicación (orden obligatorio) -->
  <script src="/scripts/postFetch.js"></script>
  <script src="/scripts/postAxios.js"></script>
  <script src="/scripts/formulario.js"></script>

  <!-- Script modo claro/oscuro -->
  <script>
    (function () {
      const btn = document.getElementById('btn-theme');
      const icon = document.getElementById('theme-icon');
      const DARK = 'dark-mode';

      function applyTheme(dark) {
        document.body.classList.toggle(DARK, dark);
        icon.className = dark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
      }

      const saved = localStorage.getItem('theme');
      applyTheme(saved === 'dark');

      btn.addEventListener('click', function () {
        const isDark = document.body.classList.contains(DARK);
        applyTheme(!isDark);
        localStorage.setItem('theme', !isDark ? 'dark' : 'light');
      });
    })();
  </script>

</body>
</html>
