<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS4 — Buscador en Tiempo Real</title>

  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="/public/styles/estilos.css" />
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between align-items-center">
    <span class="navbar-brand fw-semibold">
      <i class="bi bi-braces me-2"></i>JS4 — APIs
    </span>
    <button id="btn-theme" class="btn-theme-toggle" aria-label="Cambiar tema" title="Modo claro / oscuro">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
  </nav>

  <!-- Sección hero -->
  <section class="hero-section text-center py-5 px-3">
    <h1 class="hero-title">Buscador de Usuarios</h1>
    <p class="hero-subtitle mb-3">
      Filtrá en tiempo real sobre los datos obtenidos de la API
    </p>
    <span class="badge endpoint-badge">
      <i class="bi bi-arrow-down-circle me-1"></i>JSONPlaceholder · GET /users
    </span>
  </section>

  <!-- Barra de búsqueda -->
  <section class="search-section py-4 px-3">
    <div class="search-wrapper mx-auto">
      <label class="form-label fw-semibold mb-1" for="search-input">
        Buscar por nombre
      </label>
      <div class="search-input-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input
          type="text"
          id="search-input"
          class="form-control search-input"
          placeholder="Escribí un nombre..."
          autocomplete="off"
        />
        <button id="btn-clear" class="btn-clear" aria-label="Limpiar búsqueda">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <!-- Stats bar: actualizada en cada keystroke -->
      <div id="stats-bar" class="stats-bar mono mt-2"></div>
    </div>
  </section>

  <!-- Resultados -->
  <main class="container-xl pb-5">
    <!-- Contador de resultados -->
    <p id="counter-line" class="counter-line"></p>

    <!-- Grid de tarjetas (skeletons o cards reales) -->
    <div id="results-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"></div>
  </main>

  <!-- Pie de página -->
  <footer class="footer-bar text-center py-3">
    <small class="text-muted">JS4_P3 · Búsqueda en Tiempo Real · JSONPlaceholder</small>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmDZ4nqhVJQvMl//uGxrFJP1WBMH"
    crossorigin="anonymous"
  ></script>

  <!-- Scripts de la aplicación (orden obligatorio) -->
  <script src="/scripts/api.js"></script>
  <script src="/scripts/filtro.js"></script>
  <script src="/scripts/app.js"></script>

  <!-- Script modo claro/oscuro -->
  <script>
    (function () {
      const btn = document.getElementById('btn-theme');
      const icon = document.getElementById('theme-icon');
      const DARK = 'dark-mode';

      function applyTheme(dark) {
        document.body.classList.toggle(DARK, dark);
        icon.className = dark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
      }

      const saved = localStorage.getItem('theme');
      applyTheme(saved === 'dark');

      btn.addEventListener('click', function () {
        const isDark = document.body.classList.contains(DARK);
        applyTheme(!isDark);
        localStorage.setItem('theme', !isDark ? 'dark' : 'light');
      });
    })();
  </script>

</body>
</html>
