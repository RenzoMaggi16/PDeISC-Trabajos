<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Inventario - Ferretería</title>
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/public/styles/estilos-formulario.css">
  <link rel="stylesheet" href="/public/styles/estilos-tabla.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-fluid px-4">
      <span class="navbar-brand fw-bold">🛠️ Inventario Pro</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <button id="btn-limpiar-todo" class="btn btn-danger btn-sm nav-link text-white fw-bold px-3">Limpiar Todo</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container-fluid px-4 py-4">
    
    <!-- Live Statistics Panel -->
    <div class="row mb-4" id="panel-estadisticas">
      <div class="col-6 col-lg-3 mb-2">
        <div class="stat-card">
          <div class="stat-label">Total Ítems</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3 mb-2">
        <div class="stat-card">
          <div class="stat-label">Precio Promedio</div>
          <div class="stat-value" id="stat-promedio">$ 0.00</div>
        </div>
      </div>
      <div class="col-6 col-lg-3 mb-2">
        <div class="stat-card">
          <div class="stat-label">Rango de Precios</div>
          <div class="stat-value fs-6 mt-1" id="stat-rango">Mín: $0 - Máx: $0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3 mb-2">
        <div class="stat-card">
          <div class="stat-label">Categoría Frecuente</div>
          <div class="stat-value fs-5" id="stat-categoria">-</div>
        </div>
      </div>
    </div>

    <!-- Layout Split -->
    <div class="row g-4">
      <!-- Left Panel: Form -->
      <div class="col-12 col-lg-5">
        <div class="card form-card shadow-sm">
          <div class="card-header form-header">
            <h5 class="mb-0">Registrar Herramienta</h5>
          </div>
          <div class="card-body p-4">
            <form id="form-herramienta" novalidate>
              
              <div class="row g-3">
                <div class="col-md-6 form-group">
                  <label class="form-label">Nombre de la herramienta</label>
                  <input type="text" class="form-control" name="nombre" id="nombre" placeholder="Ej: Taladro Percutor">
                  <div class="invalid-feedback" id="error-nombre"></div>
                </div>
                
                <div class="col-md-6 form-group">
                  <label class="form-label">Marca</label>
                  <input type="text" class="form-control" name="marca" id="marca" placeholder="Ej: DeWalt">
                  <div class="invalid-feedback" id="error-marca"></div>
                </div>

                <div class="col-md-6 form-group">
                  <label class="form-label">Categoría</label>
                  <select class="form-select" name="categoria" id="categoria">
                    <option value="" disabled selected>Seleccionar...</option>
                    <option value="Eléctricas">Eléctricas</option>
                    <option value="Manuales">Manuales</option>
                    <option value="Medición">Medición</option>
                    <option value="Fijación">Fijación</option>
                    <option value="Otros">Otros</option>
                  </select>
                  <div class="invalid-feedback" id="error-categoria"></div>
                </div>

                <div class="col-md-6 form-group">
                  <label class="form-label">Voltaje / Alimentación</label>
                  <select class="form-select" name="voltaje" id="voltaje">
                    <option value="" disabled selected>Seleccionar...</option>
                    <option value="N/A">N/A (Manual)</option>
                    <option value="12V">12V</option>
                    <option value="20V">20V</option>
                    <option value="220V">220V</option>
                    <option value="Batería">Batería Litio</option>
                  </select>
                  <div class="invalid-feedback" id="error-voltaje"></div>
                </div>

                <div class="col-md-4 form-group">
                  <label class="form-label">Precio ($)</label>
                  <input type="number" class="form-control mono-font" name="precio" id="precio" placeholder="0.00">
                  <div class="invalid-feedback" id="error-precio"></div>
                </div>

                <div class="col-md-4 form-group">
                  <label class="form-label">Stock</label>
                  <input type="number" class="form-control mono-font" name="stock" id="stock" placeholder="0">
                  <div class="invalid-feedback" id="error-stock"></div>
                </div>

                <div class="col-md-4 form-group">
                  <label class="form-label">Garantía (Meses)</label>
                  <input type="number" class="form-control mono-font" name="garantia" id="garantia" placeholder="12">
                  <div class="invalid-feedback" id="error-garantia"></div>
                </div>

                <div class="col-12 form-group">
                  <label class="form-label">Unidad de Medida</label>
                  <div class="d-flex gap-3 mt-1">
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="unidad" id="unidad-und" value="Unidad">
                      <label class="form-check-label" for="unidad-und">Unidad</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="unidad" id="unidad-set" value="Set">
                      <label class="form-check-label" for="unidad-set">Set</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="unidad" id="unidad-metro" value="Metro">
                      <label class="form-check-label" for="unidad-metro">Metro</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="unidad" id="unidad-kg" value="Kg">
                      <label class="form-check-label" for="unidad-kg">Kg</label>
                    </div>
                  </div>
                  <div class="invalid-feedback d-block" style="visibility: hidden;" id="error-unidad">Requerido</div>
                </div>

                <div class="col-12 form-group">
                  <label class="form-label">Descripción breve</label>
                  <textarea class="form-control" name="descripcion" id="descripcion" rows="2" placeholder="Características principales..."></textarea>
                  <div class="invalid-feedback" id="error-descripcion"></div>
                </div>
              </div>

              <div class="mt-4">
                <button type="submit" class="btn btn-warning w-100 fw-bold main-cta">Guardar Ítem</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Right Panel: List / Data Display -->
      <div class="col-12 col-lg-7">
        
        <!-- Toggle View Controls & Methods Toolbar -->
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-3 bg-white p-3 rounded shadow-sm border">
          <div class="d-flex gap-2 align-items-center flex-grow-1">
            <h6 class="mb-0 fw-bold text-muted me-2">Inventario Actual</h6>
            <select class="form-select form-select-sm w-auto border-primary shadow-sm" id="meth-filter-sel" style="min-width: 180px;">
              <option value="">Todas las categorías</option>
            </select>
          </div>
          
          <div class="d-flex gap-2 align-items-center">
            <button type="button" class="btn btn-sm btn-outline-info fw-bold shadow-sm" id="btn-nombres-map">Nombres</button>
            <button type="button" class="btn btn-sm btn-outline-success fw-bold shadow-sm" id="btn-total-reduce">Ver Total</button>
            
            <div class="btn-group ms-2 shadow-sm" role="group">
              <button type="button" class="btn btn-sm btn-outline-secondary active" id="btn-vista-tabla">Tabla</button>
              <button type="button" class="btn btn-sm btn-outline-secondary" id="btn-vista-tarjetas">Tarjetas</button>
            </div>
          </div>
        </div>

        <!-- Render Container -->
        <div id="lista-items" class="position-relative">
          <!-- Empty State (Default) -->
          <div class="empty-state">
            <div class="fs-1 mb-2">📦</div>
            <h5>No hay ítems registrados todavía</h5>
            <p class="text-muted">Completá el formulario para comenzar a construir tu inventario.</p>
          </div>
        </div>

      </div>
    </div>


  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Custom Scripts (Must be in this order due to dependencies) -->
  <script src="/scripts/almacenamiento.js"></script>
  <script src="/scripts/estadisticas.js"></script>
  <script src="/scripts/renderizado.js"></script>
  <script src="/scripts/formulario.js"></script>

  <!-- Mobile Nav Helper -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnLimpia = document.getElementById('btn-limpiar-todo');
      const navbarCollapse = document.getElementById('navbarNav');
      btnLimpia.addEventListener('click', () => {
        if (navbarCollapse.classList.contains('show')) {
          new bootstrap.Collapse(navbarCollapse, { toggle: false }).hide();
        }
      });
    });
  </script>
</body>
</html>
