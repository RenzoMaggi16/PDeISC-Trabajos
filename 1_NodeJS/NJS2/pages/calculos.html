<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cálculos | NJ2</title>
  <meta name="description" content="Operaciones matemáticas del módulo calcModule — Proyecto NJ2." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; }
    .page-header {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border-bottom: 1px solid #21262d; padding: 2.5rem 0;
    }
    .accent-bar { height: 4px; width: 60px; background: linear-gradient(90deg, #2ea043, #56d364); border-radius: 2px; margin-bottom: 1rem; }
    .page-title { font-size: 2rem; font-weight: 800; color: #f0f6fc; margin: 0; }
    .page-sub { color: #8b949e; font-size: 0.9rem; margin-top: 0.4rem; }
    .mod-badge {
      display: inline-block; background: rgba(46,160,67,0.12);
      border: 1px solid rgba(46,160,67,0.3); color: #56d364;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      padding: 0.2rem 0.7rem; border-radius: 2rem; margin-bottom: 0.75rem;
    }
    .content-card { background: #161b22; border: 1px solid #30363d; border-radius: 0.875rem; overflow: hidden; }
    .content-card .card-top { padding: 1.25rem 1.5rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 0.75rem; }
    .card-icon { width: 38px; height: 38px; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; background: rgba(46,160,67,0.15); }
    .card-head { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #56d364; margin: 0; }
    .card-desc { font-size: 0.78rem; color: #6e7681; margin: 0; }
    .table { margin: 0; font-size: 0.875rem; }
    .table td, .table th { padding: 0.65rem 1.25rem; vertical-align: middle; }
    .table thead th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; background: #0d1117; border-color: #30363d; font-weight: 600; }
    .table-dark { --bs-table-bg: #161b22; --bs-table-striped-bg: #1c2128; --bs-table-hover-bg: #1f242c; --bs-table-border-color: #30363d; color: #c9d1d9; }
    .res-num { font-family: 'Consolas', monospace; color: #56d364; font-size: 0.85rem; }
    .res-err { font-family: 'Consolas', monospace; color: #f85149; font-size: 0.85rem; }
    footer { background: #0d1117; border-top: 1px solid #21262d; text-align: center; color: #6e7681; font-size: 0.78rem; padding: 1.5rem 0; }
    footer span { color: #30363d; margin: 0 0.4rem; }
  </style>
</head>
<body>

<menu-placeholder></menu-placeholder>

<div class="page-header">
  <div class="container">
    <div class="mod-badge">🧮 CALCMODULE.JS</div>
    <div class="accent-bar"></div>
    <h1 class="page-title"><server-page-title></server-page-title></h1>
    <p class="page-sub">Módulo personalizado para operaciones matemáticas en Node.js</p>
    <a href="/" class="btn btn-sm btn-outline-secondary mt-3">← Volver al inicio</a>
  </div>
</div>

<main class="container py-5">
  <div class="content-card">
    <div class="card-top">
      <div class="card-icon">➕</div>
      <div>
        <p class="card-head">Operaciones matemáticas</p>
        <p class="card-desc">Incluye manejo de errores para divisiones inválidas y totales en cero</p>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-dark table-striped table-hover table-bordered">
        <thead>
          <tr>
            <th>FUNCIÓN</th>
            <th>ARGUMENTOS</th>
            <th>RESULTADO</th>
            <th>DESCRIPCIÓN</th>
          </tr>
        </thead>
        <tbody>
          <server-calc></server-calc>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer>
  NJ2 <span>·</span> Node.js <span>·</span> Bootstrap 5 <span>·</span> 127.0.0.1:3000
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
