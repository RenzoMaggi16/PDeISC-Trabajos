<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJ1 · Resultados Ejercicios</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card p-3 p-md-4 custom-card shadow-sm">
          <h1 class="mb-1 text-light h5 fw-bold">Resultados &mdash; Ejercicios</h1>
          <p class="text-muted small mb-4">Calculados con funciones importadas de <code>calculos.js</code></p>
          
          <div class="table-responsive">
            <table class="table custom-table mb-0 align-middle">
              <thead>
                <tr>
                  <th scope="col">Operación</th>
                  <th scope="col">Expresión</th>
                  <th scope="col">Resultado</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Suma</td>
                  <td class="mono">5 + 3</td>
                  <td class="mono neg">8</td>
                </tr>
                <tr>
                  <td>Resta</td>
                  <td class="mono">8 - 6</td>
                  <td class="mono neg">2</td>
                </tr>
                <tr>
                  <td>Multiplicación</td>
                  <td class="mono">3 &times; 11</td>
                  <td class="mono neg">33</td>
                </tr>
                <tr>
                  <td>División</td>
                  <td class="mono">30 / 5</td>
                  <td class="mono neg">6</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="text-center mt-3 text-muted small pb-4 shadow-none">
          NJ1 &middot; node:http &middot; 127.0.0.1:3000
        </div>
      </div>
    </div>
  </div>
</body>
</html>
